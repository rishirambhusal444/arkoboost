services:
  - type: web
    name: arkoboost
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py create_superuser && gunicorn newyoutuber.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: arkoboost-db
          property: connectionString
      - key: DJANGO_SUPERUSER_USERNAME
        value: superadmin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "arkoboost.onrender.com,.onrender.com"

databases:
  - name: arkoboost-db
    plan: free
